<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Portfolio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow: visible !important; height: auto !important; max-height: none !important; }
    body { font-family: Arial, Helvetica, sans-serif; font-size: 10pt; line-height: 1.5; color: #111111; background: #ffffff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { width: 210mm; min-height: auto; margin: 0 auto; padding: 12mm 14mm 16mm; background: #ffffff; overflow: visible; }
    .header { margin-bottom: 14px; page-break-inside: avoid; }
    .header h1 { font-size: 18pt; font-weight: 700; color: #000000; letter-spacing: -0.2px; }
    .header .role-title { font-size: 10pt; font-weight: 600; color: #333333; margin-top: 2px; }
    .contact-line { font-size: 9pt; color: #444444; margin-top: 6px; }
    .section { margin-bottom: 12px; page-break-inside: avoid; break-inside: avoid; }
    .section-title { font-size: 9pt; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #000000; border-bottom: 1px solid #cccccc; padding-bottom: 2px; margin-bottom: 6px; }
    .body-text { font-size: 9.5pt; color: #222222; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; overflow-wrap: anywhere; }
    .empty-note { font-size: 9pt; color: #777777; font-style: italic; }
    .pub-card { margin-bottom: 8px; page-break-inside: avoid; padding: 0; background: transparent; border: none; border-left: none; }
    .pub-header { display: block; margin-bottom: 2px; }
    .pub-title { font-size: 9.5pt; font-weight: 700; color: #000000; display: inline; }
    .pub-year { font-size: 9pt; color: #555555; margin-left: 6px; }
    .pub-meta { display: none; }
    .pub-desc { font-size: 9pt; color: #333333; margin-top: 2px; line-height: 1.45; }
    .timeline-item { margin-bottom: 7px; page-break-inside: avoid; display: block; }
    .timeline-marker { display: none; }
    .timeline-header { display: block; }
    .timeline-title { font-size: 9.5pt; font-weight: 700; color: #000000; display: inline; }
    .timeline-year { font-size: 9pt; color: #555555; margin-left: 6px; }
    .timeline-badge { display: none; }
    .timeline-desc { font-size: 9pt; color: #333333; margin-top: 2px; line-height: 1.45; }
    .skills-grid { margin-top: 4px; }
    .skill-tag { display: inline; background: transparent; border: none; color: #222222; padding: 0; font-size: 9pt; font-weight: 400; }
    .skill-tag::after { content: " · "; color: #888888; }
    .skill-tag:last-child::after { content: ""; }
    @page { size: A4; margin: 10mm; }
    @media print { body { overflow: visible !important; } .page { width: auto; padding: 0; } }
  </style>
</head>
<body>
<div class="page">

  <header class="header">
    <h1>{{name}}</h1>
    <!-- HEADLINE_SECTION_START --><p class="role-title">{{headline}}</p><!-- HEADLINE_SECTION_END -->
    <!-- CONTACT_SECTION_START --><p class="contact-line">{{contactLine}}</p><!-- CONTACT_SECTION_END -->
  </header>

  <!-- BIO_SECTION_START -->
  <section class="section">
    <h2 class="section-title">Summary</h2>
    <p class="body-text">{{bio}}</p>
  </section>
  <!-- BIO_SECTION_END -->

  <section class="section">
    <h2 class="section-title">Skills</h2>
    <!-- SKILLS_SECTION_START --><p class="body-text">{{skillsSummary}}</p><!-- SKILLS_SECTION_END -->
    <div class="skills-grid">{{skillsList}}</div>
  </section>

  <section class="section">
    <h2 class="section-title">Experience &amp; Achievements</h2>
    {{achievements}}
  </section>

  <section class="section">
    <h2 class="section-title">Publications</h2>
    {{publications}}
  </section>

  <section class="section">
    <h2 class="section-title">Projects</h2>
    {{projects}}
  </section>

  <!-- OBJECTIVE_SECTION_START -->
  <section class="section">
    <h2 class="section-title">Objective</h2>
    <p class="body-text">{{careerObjective}}</p>
  </section>
  <!-- OBJECTIVE_SECTION_END -->

</div>
</body>
</html>
